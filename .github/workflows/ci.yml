name: CI Build

on:
  push:
    branches: ["main", "master"]
    tags: ["v*"]
  pull_request:
    branches: ["main", "master"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Build
        run: nix build

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: emf-mmf-linux
          path: result/bin/emf-mmf

  build-windows:
    name: Build Windows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Build
        run: nix build .#windows

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: emf-mmf-windows
          path: result/bin/emf-mmf.exe

  build-web:
    name: Build Web (WASM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Build
        run: nix build .#web

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: emf-mmf-web
          path: result/

  release:
    name: Create Release
    needs: [build-linux, build-windows, build-web]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: emf-mmf-linux
          path: ./linux-artifact

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: emf-mmf-windows
          path: ./windows-artifact

      - name: Download Web Artifact
        uses: actions/download-artifact@v4
        with:
          name: emf-mmf-web
          path: ./web-artifact

      - name: Package Web
        run: |
          cd web-artifact
          zip -r ../emf-mmf-web.zip .
          cd ..

      - name: Rename Binaries
        run: |
          mv linux-artifact/emf-mmf linux-emf-mmf
          mv windows-artifact/emf-mmf.exe windows-emf-mmf.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            linux-emf-mmf
            windows-emf-mmf.exe
            emf-mmf-web.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-pages:
    name: Deploy to GitHub Pages
    needs: build-web
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download Web Artifact
        uses: actions/download-artifact@v4
        with:
          name: emf-mmf-web
          path: ./web-artifact

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./web-artifact

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
