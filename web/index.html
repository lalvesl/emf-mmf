<!DOCTYPE html>
<!-- <html lang="en"> -->

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMF-MMF Simulator</title>
    <style>
        body {
            margin: 0;
            background-color: #1a1a1a;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }

        canvas {
            width: 100%;
            height: 100%;
        }
        .loader-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #1a1a1a;
            z-index: 1000;
        }

        .loader {
            border: 6px solid #333;
            border-top: 6px solid #3498db;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }
        
        .loading-text {
            color: #fff;
            margin-top: 20px;
            font-family: sans-serif;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>

<body>
    <div id="loader-wrapper" class="loader-wrapper">
        <div class="loader"></div>
        <div class="loading-text">Loading...</div>
    </div>
    <script type="module">
        import init from "./emf-mmf.js";
        try {
            await init();
        } catch (error) {
            if (!error.message || !error.message.startsWith("Using exceptions for control flow, don't panic!")) {
                console.error(error);
            }
        } finally {
            document.getElementById('loader-wrapper').style.display = 'none';
        }
    </script>
</body>


</html>
